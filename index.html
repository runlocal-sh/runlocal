<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runlocal — Pick the right AI stack. Run it on your machine.</title>
  <meta name="description" content="Fingerprint your hardware. Get the right open-weight model and runtime. Ship in one command.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Runlocal">
  <meta property="og:description" content="Pick the right open-weight AI stack for your machine. In one command.">
  <meta property="og:url" content="https://runlocal.sh">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@runlocal_sh">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>▲</text></svg>">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0a;
      --bg-elevated: #111111;
      --border: #1f1f1f;
      --border-hover: #2a2a2a;
      --text: #f5f5f5;
      --text-dim: #888;
      --text-faint: #555;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
    }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    
    /* Glow effect */
    body::after {
      content: '';
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    
    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 4rem;
    }
    
    .logo {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    
    .nav {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
    }
    
    .nav a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }
    
    .nav a:hover { color: var(--accent); }
    
    /* Hero */
    .hero {
      padding: 2rem 0 4rem;
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.85rem;
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 100px;
      font-size: 0.75rem;
      color: var(--accent);
      margin-bottom: 2rem;
    }
    
    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    h1 {
      font-size: clamp(2rem, 5.5vw, 3.25rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
    
    h1 .accent { color: var(--accent); }
    
    .sub {
      font-size: 1.05rem;
      color: var(--text-dim);
      max-width: 560px;
      margin-bottom: 2.5rem;
      line-height: 1.65;
    }
    
    /* Install block */
    .install {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
      transition: border-color 0.15s;
    }
    
    .install:hover { border-color: var(--border-hover); }
    
    .install-code {
      font-size: 0.95rem;
      color: var(--text);
      overflow-x: auto;
      white-space: nowrap;
    }
    
    .install-code .prompt { color: var(--text-faint); margin-right: 0.5rem; }
    .install-code .cmd { color: var(--accent); }
    
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    
    .copy-btn:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    
    .copy-btn.copied {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
